<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HILL Web — Desktop adaptation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: Inter, -apple-system, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Reuse mobile components — tokens, PieceShape, Board, ArenaBadge, SKINS, etc. -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<!-- Desktop additions -->
<script type="text/babel" src="web-components.jsx"></script>
<script type="text/babel" src="web-screens-a.jsx"></script>
<script type="text/babel" src="web-screens-b.jsx"></script>
<script type="text/babel" src="web-screens-c.jsx"></script>

<script type="text/babel">

// ───────────────────────────────────────────────
// Responsive comparison frame — shows the same screen
// at three viewport widths so the user can see the
// breakpoint behaviour. We use ResponsivePreview to wrap
// the real ScreenWebLanding rendered through CSS transform.
// ───────────────────────────────────────────────
function ResponsiveFrame({ label, width, height, children, scale = 1, note }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10,
    }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', gap: 10,
        fontFamily: HILL.mono, fontSize: 11, color: HILL.muted, letterSpacing: '0.14em',
      }}>
        <span style={{ color: HILL.text, fontWeight: 700, letterSpacing: '0.18em' }}>{label}</span>
        <span>·</span>
        <span>{width}px</span>
        {note && (<><span>·</span><span style={{ color: HILL.accent }}>{note}</span></>)}
      </div>
      <div style={{
        width: width * scale,
        height: height * scale,
        overflow: 'hidden',
        border: `1px solid ${HILL.border}`, borderRadius: 12,
        position: 'relative',
        background: HILL.bg,
      }}>
        <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: '0 0' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

// A simplified responsive landing that uses CSS media queries so we
// can demo the same component reflowing at 375 / 768 / 1280 / 1920.
// We approximate the responsive behaviour by rendering different
// layouts at different widths — these are the same as ScreenLanding
// (mobile) and ScreenWebLanding (desktop). 768 shows a graceful
// transition state.
function ResponsiveLanding({ vw = 1280 }) {
  if (vw <= 430) {
    return <ScreenLanding signedIn={true}/>;
  }
  if (vw <= 900) {
    // Tablet — narrow nav, stacked CTAs, smaller hero
    return (
      <div className="hill-root hill-web" style={{ width: vw, minHeight: '100%', background: HILL.bg, color: HILL.text }}>
        <TopNav active="hill" signedIn={true} sticky={false}/>
        <div style={{ padding: '48px 32px 32px' }}>
          <div className="hill-mono" style={{ fontSize: 11, color: HILL.accent, letterSpacing: '0.32em', fontWeight: 700 }}>KING · OF · THE · BOARD</div>
          <div className="hill-display" style={{
            fontSize: 168, lineHeight: 0.85, marginTop: 10,
            background: `linear-gradient(180deg,#FAFAFA 0%,#FAFAFA 55%,#707070 100%)`,
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
          }}>HILL</div>
          <div style={{ width: 36, height: 4, background: HILL.accent, marginTop: 14, boxShadow: `0 0 12px ${HILL.accent}` }}/>
          <p style={{ fontSize: 22, color: HILL.muted, marginTop: 20, maxWidth: 440 }}>
            <span style={{ color: HILL.text, fontWeight: 600 }}>4 players. 3 minutes. One hill.</span><br/>
            Browser-native checkers, re-cut for short attention spans.
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 30, maxWidth: 440 }}>
            <WebButton variant="primary" size="xl" full>→ Create Hill Room</WebButton>
            <WebButton variant="outline" size="lg" full>Play Classic 2P</WebButton>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 60 }}>
            {[
              ['01','Spawn a room','Pick Blitz or Survival. Share a code or QR.'],
              ['02','Push the hill','Each player has a shape. Hold the 2×2 center.'],
            ].map(([n,t,b]) => (
              <div key={n} className="web-card" style={{ background: HILL.surface, border: `1px solid ${HILL.border}`, borderRadius: 14, padding: 22 }}>
                <div className="hill-mono" style={{ fontSize: 10, color: HILL.muted, letterSpacing: '0.18em' }}>STEP · {n}</div>
                <div className="hill-display" style={{ fontSize: 26, marginTop: 8 }}>{t}</div>
                <div style={{ marginTop: 8, fontSize: 13, color: HILL.muted, lineHeight: 1.5 }}>{b}</div>
              </div>
            ))}
          </div>
        </div>
        <WebFooter/>
      </div>
    );
  }
  // Desktop full
  return <ScreenWebLanding signedIn={true} height={vw >= 1900 ? 900 : 900}/>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="web-overview" title="W1 · Web overview"
        subtitle="HILL desktop adaptation. Same tokens, shapes, skin system, arena tiers — new pattern for top nav, content widths, hover states, side-by-side layouts.">
        <DCArtboard id="landing-web" label="A · Landing · desktop 1280" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLanding signedIn={true}/>
        </DCArtboard>
        <DCArtboard id="landing-web-anon" label="B · Landing · guest (sign-in CTA)" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLanding signedIn={false}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-responsive" title="W2 · Responsive — same screen, four viewports"
        subtitle="Mobile (375) stays identical to the existing iOS design. Tablet (768) bridges. Laptop (1280) is the full desktop layout. Ultra-wide (1920) centers content within max-width 1280 — never stretches.">
        <DCArtboard id="resp-375" label="A · Mobile · 375px (unchanged)" width={430} height={920}
          style={{ background: '#0A0A0A', padding: 18, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <ScreenLanding signedIn={true}/>
        </DCArtboard>
        <DCArtboard id="resp-768" label="B · Tablet · 768px (transitional)" width={768} height={920}
          style={{ background: '#0A0A0A', overflow: 'hidden' }}>
          <div style={{ width: 768, height: 920, overflow: 'auto' }}>
            <ResponsiveLanding vw={768}/>
          </div>
        </DCArtboard>
        <DCArtboard id="resp-1280" label="C · Laptop · 1280px" width={1280} height={920}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLanding signedIn={true} height={920}/>
        </DCArtboard>
        <DCArtboard id="resp-1920" label="D · Ultra-wide · 1920px (content stays 1280)" width={1920} height={920}
          style={{ background: '#0A0A0A' }}>
          <div style={{ width: 1920, height: 920, overflow: 'hidden' }}>
            <ScreenWebLanding signedIn={true} height={920}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-auth" title="W3 · Auth & profile"
        subtitle="Sign in centers a 480px card on a blurred-board backdrop. Profile splits into a 1/3 identity column and a 2/3 stats + skins column.">
        <DCArtboard id="signin-web" label="A · Sign in · desktop" width={1280} height={800}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebSignIn/>
        </DCArtboard>
        <DCArtboard id="profile-web" label="B · Profile · Gold, gold skin" width={1280} height={1180}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebProfile signedIn={true} userTier="Gold" skin="gold" height={1180}/>
        </DCArtboard>
        <DCArtboard id="profile-web-master" label="C · Profile · Master, master skin" width={1280} height={1180}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebProfile signedIn={true} userTier="Master" skin="master" height={1180}/>
        </DCArtboard>
        <DCArtboard id="profile-web-guest" label="D · Profile · guest (no Google chip)" width={1280} height={1180}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebProfile signedIn={false} userTier="Bronze" skin="bronze" height={1180}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-leaderboard" title="W4 · Leaderboard — proper table"
        subtitle="Desktop ditches mobile's card stack for a real table: sticky header, hover tint, current user pinned with a lime left-border, filter pills + ⌘K search.">
        <DCArtboard id="leaderboard-web" label="A · Leaderboard · table" width={1280} height={1000}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLeaderboard height={1000}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-hill-flow" title="W5 · Hill 4P flow"
        subtitle="Mode → play style → lobby. Cards always sit side-by-side on desktop. Lobby gains a giant code, QR for mobile join, and a recent-activity feed.">
        <DCArtboard id="mode-web-blitz" label="A · Mode · Blitz selected" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebModeSelect selected="blitz" height={900}/>
        </DCArtboard>
        <DCArtboard id="mode-web-survival" label="B · Mode · Survival selected" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebModeSelect selected="survival" height={900}/>
        </DCArtboard>
        <DCArtboard id="playstyle-web-multi" label="C · Play style · Multiplayer" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebPlayStyle selected="multi" mode="blitz" height={900}/>
        </DCArtboard>
        <DCArtboard id="playstyle-web-hotseat" label="D · Play style · Hot-seat" width={1280} height={900}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebPlayStyle selected="hotseat" mode="survival" height={900}/>
        </DCArtboard>
        <DCArtboard id="lobby-web-partial" label="E · Lobby · Blitz, 2 of 4 filled" width={1280} height={980}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLobby filled="partial" mode="blitz" height={980}/>
        </DCArtboard>
        <DCArtboard id="lobby-web-full" label="F · Lobby · Survival, all four" width={1280} height={980}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebLobby filled="full" mode="survival" height={980}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-game" title="W6 · Game screens"
        subtitle="Classic centers the 8×8 with P1 LEFT, P2 RIGHT. Hill 4P puts P1+P4 on the left, P2+P3 on the right of a bigger 10×10. Turn timer & round counter sit above.">
        <DCArtboard id="classic-web" label="A · Classic 2P · mid-game" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebClassic height={1020}/>
        </DCArtboard>
        <DCArtboard id="hill-web-blitz" label="B · Hill 4P · Blitz, mid-game" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="blitz" height={1020}/>
        </DCArtboard>
        <DCArtboard id="hill-web-survival" label="C · Hill 4P · Survival, P3 eliminated" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="survival" height={1020}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-overlays" title="W7 · End-state overlays"
        subtitle="Full-viewport. Headlines scale via clamp(). The live board blurs behind instead of disappearing under a solid layer. Buttons sit horizontally, not stacked.">
        <DCArtboard id="death-web" label="A · YOU DIED · Round 3" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="blitz" height={1020} blurBoard overlay={<WebDeathOverlay round={3}/>}/>
        </DCArtboard>
        <DCArtboard id="winner-solo-web" label="B · Solo winner · Riko +24 ELO" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="blitz" height={1020} blurBoard overlay={<WebGameOverOverlay kind="solo"/>}/>
        </DCArtboard>
        <DCArtboard id="winner-joint-web" label="C · Joint kings · 2-up cards" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="blitz" height={1020} blurBoard overlay={<WebGameOverOverlay kind="joint"/>}/>
        </DCArtboard>
        <DCArtboard id="winner-none-web" label="D · No king today (Survival draw)" width={1280} height={1020}
          style={{ background: '#0A0A0A' }}>
          <ScreenWebHillGame mode="survival" height={1020} blurBoard overlay={<WebGameOverOverlay kind="none"/>}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="web-components" title="W8 · New web components"
        subtitle="The reusable pieces the web design introduces on top of the mobile kit.">
        <DCArtboard id="topnav-comp" label="A · TopNav · signed in vs guest" width={1280} height={200}
          style={{ background: '#0A0A0A', display: 'flex', flexDirection: 'column' }}>
          <div className="hill-root hill-web" style={{ background: HILL.bg, color: HILL.text }}>
            <TopNav active="hill" signedIn={true}/>
            <div style={{ height: 24 }}/>
            <TopNav active="top" signedIn={false}/>
          </div>
        </DCArtboard>
        <DCArtboard id="qr-comp" label="B · FakeQrCode" width={300} height={300}
          style={{ background: '#0A0A0A', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div className="hill-root" style={{ background: HILL.bg, padding: 20 }}>
            <FakeQrCode value="ABCD" size={200}/>
          </div>
        </DCArtboard>
        <DCArtboard id="leaderboard-table-comp" label="C · LeaderboardTable" width={1100} height={520}
          style={{ background: '#0A0A0A', padding: 20 }}>
          <div className="hill-root hill-web" style={{ background: HILL.bg, padding: 14 }}>
            <LeaderboardTable rows={[
              { rank: 1, name: 'Sam Wilson',  tier: 'Champion', wins: 142, games: 200, wr: 71, elo: 2480 },
              { rank: 2, name: 'mira_42',     tier: 'Champion', wins: 128, games: 188, wr: 68, elo: 2410 },
              { rank: 3, name: 'Aida.K',      tier: 'Master',   wins: 117, games: 183, wr: 64, elo: 2245 },
              { rank: 4, name: 'Player_a3f9', tier: 'Gold',     wins:  88, games: 160, wr: 55, elo: 1996, isYou: true, badge: '— YOU' },
              { rank: 5, name: 'noir',        tier: 'Silver',   wins:  74, games: 145, wr: 51, elo: 1810 },
            ]}/>
          </div>
        </DCArtboard>
        <DCArtboard id="piece-preview-comp" label="D · PieceSamplePreview" width={520} height={220}
          style={{ background: '#0A0A0A', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14 }}>
          <div className="hill-root hill-web" style={{ background: HILL.bg, padding: 24, display: 'flex', gap: 14 }}>
            <PieceSamplePreview player={1} skin="silver"/>
            <PieceSamplePreview player={2} skin="gold"/>
            <PieceSamplePreview player={3} skin="bronze"/>
            <PieceSamplePreview player={4} skin="master"/>
            <PieceSamplePreview player={1} skin="champion"/>
          </div>
        </DCArtboard>
        <DCArtboard id="side-panel-comp" label="E · SidePlayerPanel · idle / active / eliminated" width={780} height={300}
          style={{ background: '#0A0A0A', padding: 18 }}>
          <div className="hill-root hill-web" style={{ background: HILL.bg, padding: 14, display: 'flex', gap: 12 }}>
            <SidePlayerPanel player={1} name="Aida K." tier="Gold" you alivePieces={7} skin="gold" alignment="left"/>
            <SidePlayerPanel player={2} name="Marcus"  tier="Gold" isActive secondsLeft={6} secondsTotal={10} alivePieces={7} skin="gold" alignment="left"/>
            <SidePlayerPanel player={3} name="Sam"     tier="Bronze" eliminated alivePieces={3} skin="bronze" alignment="left"/>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
